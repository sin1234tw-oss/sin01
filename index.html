<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>享樂動態</title>
    <style>
        body { background-color: #050505; color: #d4af37; font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .main-title { margin-top: 40px; margin-bottom: 30px; font-size: 2.8rem; font-weight: bold; text-align: center; color: #f1df99; letter-spacing: 4px; text-shadow: 0 0 15px rgba(241, 223, 153, 0.3); }
        .menu-container { width: 95%; max-width: 500px; display: flex; flex-direction: column; gap: 18px; }
        .menu-btn { background: linear-gradient(180deg, #181818 0%, #0d0d0d 100%); border: 1px solid #222; border-radius: 12px; padding: 22px 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.6); border-left: 5px solid #ffd700; }
        .btn-text { color: #ffffff; font-size: 1.3rem; font-weight: bold; letter-spacing: 2px; }
        .btn-arrow { color: #ffd700; font-size: 1rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); z-index: 1000; }
        .modal-content { background: linear-gradient(135deg, #141414 0%, #050505 100%); border: 2px solid #ffd700; margin: 5vh auto; padding: 25px 20px; width: 90%; max-width: 420px; max-height: 85vh; overflow-y: auto; border-radius: 16px; position: relative; color: #f5ecc2; text-align: left; }
        .close-btn { position: absolute; top: 12px; right: 20px; color: #ffd700; font-size: 28px; font-weight: bold; cursor: pointer; }
        .sub-menu-container { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .sub-menu-btn { background: #222; border: 1px solid #d4af37; color: #fff; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; text-align: center; cursor: pointer; }
        .schedule-text { white-space: pre-wrap; word-break: break-all; background: #111; padding: 15px; border-radius: 8px; border-left: 3px solid #ffd700; font-size: 1.1rem; line-height: 1.6; color: #ffffff; margin-bottom: 15px; }
        .schedule-image-container { width: 100%; display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .schedule-image { width: 100%; max-height: 450px; object-fit: contain; border-radius: 8px; border: 2px solid #D4AF37; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.6); }
        .content-wrapper { display: flex; flex-direction: column; gap: 10px; }
        .price-time-section { background: rgba(255, 215, 0, 0.03); border: 1px solid rgba(255, 215, 0, 0.15); padding: 12px; border-radius: 8px; }
        .highlight-gold { color: #ffd700; font-weight: bold; font-size: 1.1rem; display: inline-block; }
        .sub-text { color: #bbb; font-size: 0.9rem; display: block; margin-top: 2px; }
        .custom-hr { border: none; height: 1px; background: linear-gradient(90deg, transparent, #ffd700, transparent); margin: 4px 0; }
        .mode-section { display: flex; flex-direction: column; gap: 8px; }
        .mode-card { background: #111; border-left: 4px solid #ffd700; padding: 10px 12px; border-radius: 4px 8px 8px 4px; }
        .mode-title { color: #ffffff; font-weight: bold; font-size: 1.05rem; margin-bottom: 2px; display: block; }
        .service-card { background: rgba(255,255,255,0.02); border: 1px dashed rgba(255, 215, 0, 0.3); padding: 10px 12px; border-radius: 8px; color: #ffffff; }
        .extra-card { font-size: 0.95rem; color: #a8a8a8; text-align: center; border-top: 1px solid #222; padding-top: 8px; }
        .extra-title { color: #ffd700; font-weight: bold; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <h1 class="main-title">享樂動態</h1>

    <div class="menu-container">
        <div class="menu-btn" onclick="openModal('priceModal')">
            <span class="btn-text">消費方式</span>
            <span class="btn-arrow">▼</span>
        </div>
        <div class="menu-btn" onclick="openModal('shopMenuModal')">
            <span class="btn-text">各館當日動態</span>
            <span class="btn-arrow">▼</span>
        </div>
        <div class="menu-btn" onclick="alert('功能製作中...')">
            <span class="btn-text">本週各館報班</span>
            <span class="btn-arrow">▼</span>
        </div>
        <div class="menu-btn" onclick="alert('功能製作中...')">
            <span class="btn-text">快速聯繫窗口</span>
            <span class="btn-arrow">▼</span>
        </div>
    </div>

    <div id="priceModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('priceModal')">×</span>
            <div class="content-wrapper">
                <div class="price-time-section">
                    <span class="highlight-gold">金額2900-3900起</span>
                    <span class="sub-text">看你選到哪位美容師才知道</span>
                    <div style="margin-top: 6px;"><span class="highlight-gold">時間60分(含沖澡)</span></div>
                </div>
                <div class="custom-hr"></div>
                <div class="mode-section">
                    <span class="highlight-gold" style="font-size: 1rem;">模式分為 :</span>
                    <div class="mode-card"><span class="mode-title">1.現場挑選</span>站一排 給你挑你喜歡的!<br>(選到再消費)</div>
                    <div class="mode-card"><span class="mode-title">2.幹部推薦</span>由幹部幫你做預約推薦<br>(預約不可更換美容師)</div>
                </div>
                <div class="custom-hr"></div>
                <div>
                    <span class="highlight-gold" style="font-size: 1rem; margin-bottom: 4px;">服務內容：</span>
                    <div class="service-card">按摩指油壓<br>卸甲＋重點手工排毒保養</div>
                </div>
                <div class="custom-hr"></div>
                <div class="extra-card"><span class="extra-title">額外課程費用請自談</span>音樂課<br>體育課</div>
            </div>
        </div>
    </div>

    <div id="shopMenuModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('shopMenuModal')">×</span>
            <h3 style="text-align: center; color: #ffd700; margin-top: 0; letter-spacing: 2px;">請選擇館別</h3>
            <div class="sub-menu-container">
                <div class="sub-menu-btn" onclick="fetchShopTab('1館-夏威夷', '1')">1館-夏威夷</div>
                <div class="sub-menu-btn" onclick="fetchShopTab('2館-茶湯會', '2')">2館-茶湯會</div>
                <div class="sub-menu-btn" onclick="fetchShopTab('3館-愛寶', '3')">3館-愛寶</div>
                <div class="sub-menu-btn" onclick="fetchShopTab('4館-芯苑', '4')">4館-芯苑</div>
                <div class="sub-menu-btn" onclick="fetchShopTab('5館-潘朵拉', '5')">5館-潘朵拉</div>
                <div class="sub-menu-btn" onclick="fetchShopTab('6館-手中情', '6')">6館-手中情</div>
                <div class="sub-menu-btn" onclick="fetchShopTab('7館-樂鑽', '7')">7鑽-樂鑽</div>
            </div>
        </div>
    </div>

    <div id="shopDetailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('shopDetailModal')">×</span>
            <h3 id="dynamicShopTitle" style="text-align: center; color: #ffd700; margin-top: 0;">館別名稱</h3>
            <div id="dynamicSchedule" class="schedule-text">正在即時讀取分頁資料...</div>
            <div id="dynamicImageArea" class="schedule-image-container"></div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1i0yb8gEWBHBJaY6KGtc_NasIC6oe5XUBx9wwoO3_MiM'; 
        let githubFolderNumber = '1'; 

        function openModal(id) { document.getElementById(id).style.display = "block"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        function fetchShopTab(tabName, folderNum) {
            closeModal('shopMenuModal'); 
            githubFolderNumber = folderNum; 
            document.getElementById('dynamicShopTitle').innerText = tabName; 
            document.getElementById('dynamicSchedule').innerText = "正在即時連線抓取【" + tabName + "】分頁...";
            document.getElementById('dynamicImageArea').innerHTML = "";
            openModal('shopDetailModal');

            const oldScript = document.getElementById('jsonp-tab-script');
            if (oldScript) oldScript.remove();

            const jsonpUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=responseHandler:googleTabCallback&sheet=${encodeURIComponent(tabName)}&cachebust=` + new Date().getTime();

            const scriptElement = document.createElement('script');
            scriptElement.id = 'jsonp-tab-script';
            scriptElement.src = jsonpUrl;
            document.body.appendChild(scriptElement);
        }

        function googleTabCallback(data) {
            const scheduleContainer = document.getElementById('dynamicSchedule');
            const imgArea = document.getElementById('dynamicImageArea');
            
            try {
                if (data && data.table && data.table.rows && data.table.rows.length > 0) {
                    const firstRow = data.table.rows[0];
                    if (firstRow && firstRow.c) {
                        const textCell = firstRow.c[0];
                        scheduleContainer.textContent = (textCell && textCell.v !== null) ? String(textCell.v) : "今日暫無文字班表更新。";
                    }
                } else {
                    scheduleContainer.textContent = "今日暫無文字班表更新。";
                }

                // 修正後的核心：精準對齊真正的儲存庫 sin01 狂抓照片
                const maxPhotos = 150; 
                for (let i = 1; i <= maxPhotos; i++) {
                    const img = document.createElement('img');
                    img.src = `https://raw.githubusercontent.com/sin1234tw-oss/sin01/main/${githubFolderNumber}/${i}.jpg`;
                    img.className = 'schedule-image';
                    img.loading = 'lazy';
                    img.onerror = function() { this.remove(); };
                    imgArea.appendChild(img);
                }
            } catch (e) {
                console.error(e);
                scheduleContainer.textContent = "讀取資料失敗，請檢查試算表。";
            }
        }

        window.onclick = function(event) { if (event.target.classList.contains('modal')) { event.target.style.display = "none"; } }
    </script>
</body>
</html>
